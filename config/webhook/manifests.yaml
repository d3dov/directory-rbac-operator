---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-ldaprbac-io-v1alpha1-clusterrbacgroupbinding
  failurePolicy: Fail
  name: vclusterrbacgroupbinding.ldaprbac.io
  rules:
  - apiGroups:
    - ldaprbac.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - clusterrbacgroupbindings
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-ldaprbac-io-v1alpha1-rbacgroupbinding
  failurePolicy: Fail
  name: vrbacgroupbinding.ldaprbac.io
  rules:
  - apiGroups:
    - ldaprbac.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - rbacgroupbindings
  sideEffects: None
