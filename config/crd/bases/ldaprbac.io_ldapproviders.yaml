---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: ldapproviders.ldaprbac.io
spec:
  group: ldaprbac.io
  names:
    categories:
    - ldaprbac
    kind: LDAPProvider
    listKind: LDAPProviderList
    plural: ldapproviders
    shortNames:
    - ldapp
    singular: ldapprovider
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.url
      name: URL
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          LDAPProvider describes connection settings for an LDAP/Active Directory
          server used as a source of group membership.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              LDAPProviderSpec describes how to connect to and query an LDAP/AD
              directory.
            properties:
              bindDN:
                description: BindDN is the distinguished name the operator authenticates
                  as.
                type: string
              bindPasswordSecretRef:
                description: BindPasswordSecretRef holds the bind credential.
                properties:
                  key:
                    type: string
                  name:
                    type: string
                required:
                - key
                - name
                type: object
              directoryType:
                default: OpenLDAP
                description: |-
                  DirectoryType picks the directory backend and, with it, the
                  backend-specific behavior described on the DirectoryType* constants.
                  Rejecting anything outside the enum keeps that switch explicit: a
                  typo'd or unsupported value fails validation instead of silently
                  falling back to OpenLDAP behavior against a server that isn't OpenLDAP.
                enum:
                - OpenLDAP
                - ActiveDirectory
                - FreeIPA
                type: string
              groupSearchBase:
                description: GroupSearchBase is the base DN under which group entries
                  are searched.
                type: string
              insecureSkipTLS:
                default: false
                description: |-
                  InsecureSkipTLS allows a plaintext ldap:// bind with no StartTLS
                  upgrade. Must be set explicitly; there is no implicit plaintext
                  fallback.
                type: boolean
              syncInterval:
                description: |-
                  SyncInterval is how often bindings referencing this provider re-query
                  group membership.
                type: string
              tlsConfig:
                description: TLSConfig customizes CA validation for ldaps:// and StartTLS.
                properties:
                  caSecretRef:
                    description: |-
                      CASecretRef points at a PEM-encoded CA bundle used instead of (in
                      addition to) the system trust store.
                    properties:
                      key:
                        type: string
                      name:
                        type: string
                    required:
                    - key
                    - name
                    type: object
                type: object
              url:
                description: |-
                  URL of the directory server, e.g. ldaps://ad.corp.local:636 or
                  ldap://ad.corp.local:389.
                pattern: ^ldaps?://.+
                type: string
              userSearchBase:
                description: UserSearchBase is the base DN under which user entries
                  are searched.
                type: string
              usernameAttribute:
                default: uid
                description: |-
                  UsernameAttribute is the user-entry attribute projected as the
                  rbacv1.Subject name for resolved members. It must match whatever the
                  cluster's OIDC/Dex layer presents as the authenticated username claim;
                  the operator has no visibility into that mapping, so this is
                  configurable rather than assumed. Common values: uid (POSIX/OpenLDAP),
                  sAMAccountName or userPrincipalName (Active Directory).
                type: string
            required:
            - bindDN
            - bindPasswordSecretRef
            - groupSearchBase
            - syncInterval
            - url
            - userSearchBase
            type: object
          status:
            description: |-
              LDAPProviderStatus reports the last observed health of the directory
              connection.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastVerifiedTime:
                format: date-time
                type: string
              observedGeneration:
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
