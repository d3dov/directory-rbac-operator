name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/denis-da-engineer/directory-rbac-operator
      CHART_REGISTRY: oci://ghcr.io/denis-da-engineer/charts
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish multi-architecture image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:${{ github.ref_name }}
            ${{ env.IMAGE }}:latest

      - uses: azure/setup-helm@v4

      - name: Package and publish Helm chart
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          helm lint charts/directory-rbac-operator
          helm package charts/directory-rbac-operator \
            --version "$version" --app-version "$version" --destination dist
          echo "$GITHUB_TOKEN" | helm registry login ghcr.io \
            --username "${GITHUB_ACTOR}" --password-stdin
          helm push dist/*.tgz "$CHART_REGISTRY"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" dist/*.tgz --generate-notes
