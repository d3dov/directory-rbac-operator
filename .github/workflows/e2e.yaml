name: E2E

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout_minutes }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: openldap
            timeout_minutes: 20
          - backend: samba-ad
            timeout_minutes: 25
          - backend: freeipa
            # FreeIPA configures a full IPA stack on first boot; allow its
            # Directory Server ample time without slowing other backends.
            timeout_minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: azure/setup-helm@v4

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.32.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Start LDAP backend and seed test data
        run: |
          if [ "${{ matrix.backend }}" = openldap ]; then
            docker compose up -d
            make ldap-seed
          elif [ "${{ matrix.backend }}" = samba-ad ]; then
            # GitHub-hosted runners cannot license or run a real Microsoft AD
            # server. Samba AD DC implements the AD LDAP controls exercised by
            # this suite, including LDAP_MATCHING_RULE_IN_CHAIN and paging.
            docker run -d --privileged --name ldaprbac-samba-ad --hostname dc1 \
              -e REALM=CORP.LOCAL -e DOMAIN=CORP -e ADMIN_PASS='Passw0rd!123' \
              -e DNS_FORWARDER=8.8.8.8 -e BIND_NETWORK_INTERFACES=false \
              diegogslomp/samba-ad-dc
            until docker exec ldaprbac-samba-ad samba-tool domain info 127.0.0.1 >/dev/null 2>&1; do sleep 5; done
            docker exec ldaprbac-samba-ad samba-tool user create alice 'Passw0rd!123'
            docker exec ldaprbac-samba-ad samba-tool user create bob 'Passw0rd!123'
            docker exec ldaprbac-samba-ad samba-tool user create carol 'Passw0rd!123'
            docker exec ldaprbac-samba-ad samba-tool group add data-team
            docker exec ldaprbac-samba-ad samba-tool group addmembers data-team alice,bob
          else
            docker volume create ldaprbac-freeipa-data
            docker run -d --name ldaprbac-freeipa --hostname ipa.corp.local --read-only \
              --cgroupns=host -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
              -v ldaprbac-freeipa-data:/data -e PASSWORD='Passw0rd!123' \
              -e IPA_SERVER_IP=no-update freeipa/freeipa-server:rocky-9-4.13.1 \
              ipa-server-install -U -r CORP.LOCAL -n corp.local --no-ntp --skip-mem-check
            # Do not use the container's generic "running" state: it can be
            # true while IPA is still configuring. The operator depends on
            # 389 Directory Server, so wait for that service specifically.
            until docker exec ldaprbac-freeipa systemctl is-active dirsrv@CORP-LOCAL.service | grep -qx active; do
              sleep 10
            done
            docker exec -i ldaprbac-freeipa kinit admin <<<'Passw0rd!123'
            docker exec ldaprbac-freeipa ipa user-add alice --first=Alice --last=Example
            docker exec ldaprbac-freeipa ipa user-add bob --first=Bob --last=Example
            docker exec ldaprbac-freeipa ipa user-add carol --first=Carol --last=Example
            docker exec ldaprbac-freeipa ipa group-add data-team
            docker exec ldaprbac-freeipa ipa group-add-member data-team --users=alice,bob
          fi

      - name: Create kind cluster
        run: kind create cluster --name ldaprbac-e2e --wait 2m

      - name: Connect kind to the LDAP backend network
        run: |
          if [ "${{ matrix.backend }}" = openldap ]; then
            docker network connect directory-rbac-operator_default ldaprbac-e2e-control-plane
          else
            docker network connect bridge ldaprbac-e2e-control-plane
          fi

      - name: Build and load the operator image
        run: |
          docker build -t directory-rbac-operator:e2e .
          kind load docker-image directory-rbac-operator:e2e --name ldaprbac-e2e

      - name: Run E2E checks
        run: E2E_BACKEND="${{ matrix.backend }}" ./test/e2e/run.sh

      - name: Operator logs (on failure)
        if: failure()
        run: kubectl -n ldaprbac-system logs deploy/ldaprbac --tail=200 || true

      - name: Describe resources (on failure)
        if: failure()
        run: |
          kubectl get ldapprovider,rbacgroupbinding,rolebinding -A -o yaml || true

      - name: Tear down
        if: always()
        run: |
          kind delete cluster --name ldaprbac-e2e || true
          docker compose down -v || true
          docker rm -f ldaprbac-samba-ad || true
          docker rm -f ldaprbac-freeipa || true
          docker volume rm ldaprbac-freeipa-data || true
