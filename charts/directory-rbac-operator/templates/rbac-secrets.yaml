{{- if and .Values.rbac.create .Values.rbac.strict }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "directory-rbac-operator.fullname" . }}-secrets-role
  namespace: {{ include "directory-rbac-operator.secretNamespace" . }}
  labels:
    {{- include "directory-rbac-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "directory-rbac-operator.fullname" . }}-secrets-rolebinding
  namespace: {{ include "directory-rbac-operator.secretNamespace" . }}
  labels:
    {{- include "directory-rbac-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "directory-rbac-operator.fullname" . }}-secrets-role
subjects:
  - kind: ServiceAccount
    name: {{ include "directory-rbac-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
