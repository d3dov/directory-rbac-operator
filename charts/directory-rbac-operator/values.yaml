replicaCount: 1

# Keep one controller pod available during voluntary disruptions. For HA
# installations, raise replicaCount and adjust minAvailable to match the
# availability budget required by the cluster.
podDisruptionBudget:
  enabled: true
  minAvailable: 1

image:
  repository: ghcr.io/denis-da-engineer/directory-rbac-operator
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true
  # strict moves Secret access (the bindPasswordSecretRef/caSecretRef
  # Secrets every LDAPProvider reads via --secret-namespace) from a
  # cluster-wide ClusterRole rule into a namespaced Role scoped to the
  # release namespace, so a compromised operator pod can't read Secrets
  # outside its own namespace. Off by default for simplicity; the operator
  # only ever reads secretNamespace regardless of this setting.
  strict: false

# secretNamespace overrides the namespace consulted for every LDAPProvider's
# Secret refs (--secret-namespace). Empty defaults to the release namespace.
secretNamespace: ""

leaderElection:
  enabled: false

metrics:
  bindAddress: ":8080"
  serviceMonitor:
    # Requires the prometheus-operator CRDs; off by default so the chart
    # installs cleanly without them.
    enabled: false
    interval: 30s
    labels: {}

healthProbe:
  bindAddress: ":8081"

# Passed through to controller-runtime's --zap-log-level flag. Use debug only
# while diagnosing a reconcile or directory connectivity issue.
logLevel: info

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
